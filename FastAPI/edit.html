{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center mt-3">
    <div class="col-md-6">
        <div class="card shadow">
            <div class="card-header bg-secondary text-white">
                <i class="bi bi-pencil-square"></i> Edit Note
            </div>
            <div class="card-body p-4">
                <form method="post" action="/notes/edit/{{ note.id }}">
                    <div class="mb-3">
                        <label class="form-label">Title</label>
                        <input type="text" name="title" class="form-control" value="{{ note.title }}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Content</label>
                        <textarea name="content" class="form-control" rows="5" required>{{ note.content }}</textarea>
                    </div>
                    <div class="d-flex justify-content-between align-items-center">
                        <div class="form-check">
                            <input type="checkbox" name="important" id="important" class="form-check-input" value="on"
                                {% if note.important %}checked{% endif %}>
                            <label for="important" class="form-check-label text-danger">
                                <i class="bi bi-star-fill"></i> Mark as Important
                            </label>
                        </div>
                        <div class="d-flex gap-2">
                            <a href="/notes" class="btn btn-outline-secondary">Cancel</a>
                            <button type="submit" class="btn btn-primary">
                                <i class="bi bi-save"></i> Update Note
                            </button>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
